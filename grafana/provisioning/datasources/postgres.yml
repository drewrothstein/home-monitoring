apiVersion: 1

# uid: stable id for API/UI; the home dashboard resolves this datasource by name
# ("Home Monitor PostgreSQL") so it works even if an older install used another uid.
datasources:
  - name: Home Monitor PostgreSQL
    uid: home-monitor-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: home_monitor
    user: home_monitor
    secureJsonData:
      password: home_monitor_password
    jsonData:
      database: home_monitor
      sslmode: disable
      maxOpenConns: 100
      maxIdleConns: 100
      connMaxLifetime: 14400
    isDefault: true
    editable: true
