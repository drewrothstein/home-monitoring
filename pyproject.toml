[tool.black]
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
)/
'''
include = '\.pyi?$'
line-length = 100
target-version = ['py311']

[tool.isort]
known_first_party = ["home_monitor"]
line_length = 100
profile = "black"
skip_glob = ["*/migrations/*", "*/venv/*", "*/.venv/*"]

